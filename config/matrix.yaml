# Test matrix for the study-in-germany v0.2 demo.
#
# This file is the executable source of truth for the strict, resumable
# ``run_gameplay_agent.py matrix`` command. CI can dry-run it on every
# change and execute it on scheduled/manual integration runs.
#
# See docs/REVIEW_FEEDBACK.md §15 and docs/ACTION_PLAN.md T08.

version: demo-v02
weeks: 20
runs_per_cell: 200
# RunSimulation expands each base seed across runs_per_cell consecutive seeds.
# Keep bases at least 200 apart so repetition batches do not overlap.
seeds: [42, 1042, 2042]

difficulties:
  - normal
  - realistic

policies:
  - random
  - balanced
  - study
  - work
  - social
  - admin
  - slacker

policy_aliases:
  money: work
  visa: admin

scenarios:
  - default_first_semester
  - low_money_start
  - high_stress_start

boundary:
  runs: 30
  seed: 42
  weeks: 20
  policy: balanced
  extremes:
    - zero_money
    - deep_debt
    - no_energy
    - all_negative
    - no_language
    - flag_chaos
    - week_zero
    - already_registered

play:
  default_persona: newbie
  personas:
    - newbie
    - study
    - money
    - social
    - visa
    - slacker
  weeks: 20
  difficulty: realistic
  seeds: [42]
  outcome_coverage:
    success_is_not_required_per_persona: true
    designed_failure_is_valid: true
    expected_categories:
      - success
      - recovery_or_mixed
      - designed_failure
    invalid_endings:
      - unknown
      - pipeline_stalled

compare:
  output_dir: reports/compare
  include:
    - ending_distribution.csv
    - action_pick_rates.csv
    - weekly_stats.csv
    - anomalies.jsonl
    - value_report.json
    - route_report.json
    - coverage_report.json
