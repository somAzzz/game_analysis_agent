# Orchestration for game_analysis_agent.
#
# Default startup is the CPU-only static dashboard. Optional profiles provide
# Replay, Godot tools, the legacy CLI, and NVIDIA local inference.
#
# Notes (mirrored from fintext_llm/docker-compose.yml for consistency):
#   * vLLM v0.25.0 is the latest stable image with NVFP4 + MTP support
#     validated against Qwen3.6. vLLM_BIND_PORT defaults to 8000 so
#     this stack does not collide with fintext_llm on 30000.
#   * NVFP4 requires Blackwell (sm_100 / sm_120). Qwen3.6 ships with
#     MTP weights; the speculative config is enabled by default and
#     can be disabled with LLM_ENABLE_MTP=0.
#   * The agent service does NOT need GPU access — the vLLM endpoint
#     is plain HTTP. It also does not need the GPU driver / CUDA
#     stack; it's a normal slim Python image.

services:
  vllm:
    # Pinned 2026-07-XX: v0.25.0 is the latest stable tag with NVFP4 + MTP
    # validated against Qwen3.6 27B NVFP4. Bump quarterly. See fintext_llm
    # for the same pin rationale.
    image: vllm/vllm-openai:v0.25.0
    # v0.25.0 image keeps ENTRYPOINT=["vllm","serve"] — a plain
    # ``command`` would prepend ``vllm serve``, which then misreads
    # the next positional argument. Empty entrypoint lets the shell
    # script below run as-is. Verify after upgrade; if upstream changes
    # the entrypoint back to plain ``vllm``, drop the empty-string override.
    entrypoint: ""
    ports:
      - "${VLLM_BIND_PORT:-8000}:8000"
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    environment:
      # vLLM's strict env-var validation warns about any ``VLLM_*``
      # variable it does not recognize. Whitelist only what vLLM itself
      # consumes; the Python client reads its config from the host's
      # .env (which is auto-loaded by ``analyse_agent.env.load_dotenv``)
      # so we don't need to forward ``VLLM_BASE_URL`` / ``VLLM_API_KEY``
      # into the container.
      - HF_TOKEN=${HF_TOKEN:-}
      - HF_HUB_ENABLE_HF_TRANSFER=${HF_HUB_ENABLE_HF_TRANSFER:-0}
      - CUDA_DEVICE_ORDER=PCI_BUS_ID
      - CUDA_VISIBLE_DEVICES=${CUDA_VISIBLE_DEVICES:-0}
      - LLM_MODEL=${LLM_MODEL:-nvidia/Qwen3.6-27B-NVFP4}
      - LLM_MAX_MODEL_LEN=${LLM_MAX_MODEL_LEN:-32768}
      - LLM_ENABLE_MTP=${LLM_ENABLE_MTP:-1}
      - LLM_GPU_MEMORY_UTILIZATION=${LLM_GPU_MEMORY_UTILIZATION:-0.9}
      - LLM_SERVED_MODEL_NAME=${LLM_SERVED_MODEL_NAME:-qwen3.6-27b-nvfp4}
      - LLM_API_KEY=${VLLM_API_KEY:-local-dev-token}
    ipc: host
    shm_size: '32gb'
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    # Default model is NVIDIA's official NVFP4 quant
    # (``nvidia/Qwen3.6-27B-NVFP4``). Override with LLM_MODEL.
    # MTP speculative decoding is on by default — Qwen3.6 ships
    # with MTP weights; set ``LLM_ENABLE_MTP=0`` in .env to disable
    # it for checkpoints that lack MTP tensors (the
    # ``--speculative-config`` flag will error out otherwise).
    #
    # The sh wrapper does shell-side substitution so the JSON for
    # --speculative-config can be emitted literally. We avoid YAML
    # block scalars (``|``) because Compose only interpolates
    # ``$$`` -> ``$`` inside flow-style scalars.
    command:
      - sh
      - -c
      - >-
        MODEL="$${LLM_MODEL:-nvidia/Qwen3.6-27B-NVFP4}";
        ARGS="$${MODEL} --host 0.0.0.0 --port 8000 --api-key $${LLM_API_KEY:-local-dev-token} --served-model-name $${LLM_SERVED_MODEL_NAME:-qwen3.6-27b-nvfp4} --trust-remote-code --quantization modelopt --reasoning-parser qwen3 --generation-config vllm --dtype bfloat16 --gpu-memory-utilization $${LLM_GPU_MEMORY_UTILIZATION:-0.9} --max-model-len $${LLM_MAX_MODEL_LEN:-32768}";
        if [ "$${LLM_ENABLE_MTP:-1}" = "1" ]; then
        ARGS="$${ARGS} --speculative-config {\"method\":\"mtp\",\"num_speculative_tokens\":3}";
        fi;
        exec vllm serve $${ARGS}
    healthcheck:
      test: ["CMD", "python3", "-c", "import os, urllib.request, sys; req=urllib.request.Request('http://127.0.0.1:8000/v1/models', headers={'Authorization': 'Bearer ' + os.environ.get('LLM_API_KEY', 'local-dev-token')}); sys.exit(0 if urllib.request.urlopen(req, timeout=5).status == 200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 600s
    restart: unless-stopped
    profiles:
      - local-nvidia

  godot:
    # Long-running tool sidecar. scripts/godot-docker-wrapper uses
    # `docker compose exec` when this service is up and falls back to an
    # equivalent one-shot `docker run` otherwise.
    image: ${GODOT_DOCKER_IMAGE:-barichello/godot-ci:4.4}
    entrypoint: ["/bin/sh", "-c"]
    command: ["exec sleep infinity"]
    environment:
      HOME: /tmp/game-analysis-godot-home
    volumes:
      # Mount the parent of this repository at the identical host path.
      # The runner passes absolute game --path and Agent report --out paths.
      # Set GODOT_DOCKER_MOUNT_ROOT to the parent directory that contains
      # game_analysis_agent before `compose up`; the game demo is embedded.
      # The fallback below is /tmp so the service can still start on a
      # clean machine, but it is only useful for syntax / healthcheck checks
      # — real game runs need the project tree mounted here.
      - ${GODOT_DOCKER_MOUNT_ROOT:-/tmp}:${GODOT_DOCKER_MOUNT_ROOT:-/tmp}
      - /tmp:/tmp
    working_dir: /tmp
    init: true
    healthcheck:
      test: ["CMD", "godot", "--version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    profiles:
      - game-tools

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.judge
    entrypoint: ["/app/.venv/bin/python", "tools/run_judge_api.py"]
    command: ["--host", "0.0.0.0", "--port", "8080", "--frontend", "/app/frontend/dist"]
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_PERSONA_MODEL=${OPENAI_PERSONA_MODEL:-gpt-5.6-luna}
    ports:
      - "${JUDGE_PORT:-8080}:8080"
    init: true
    read_only: true
    tmpfs:
      - /tmp:size=16m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/api/provider-status', timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 5

  replay:
    build:
      context: .
      dockerfile: Dockerfile.judge
    command: ["--mode", "replay", "--offline", "--json", "--output-dir", "-"]
    network_mode: none
    read_only: true
    tmpfs:
      - /tmp:size=32m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    profiles:
      - judge

  agent:
    # Built from the Dockerfile in this repo. This container is intended for
    # pure-Python analysis/QA commands. Gameplay commands run on the host with
    # GODOT_BIN=scripts/godot-docker-wrapper so they can exec the sidecar.
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      # The agent inside the container reaches vLLM through the
      # compose-network DNS name ``vllm`` on port 8000. The host-side
      # ``VLLM_BASE_URL`` from .env (e.g. http://localhost:8000/v1) is
      # overridable per-call via ``docker compose run -e``.
      - VLLM_BASE_URL=${VLLM_BASE_URL:-http://vllm:8000/v1}
      - VLLM_API_KEY=${VLLM_API_KEY:-local-dev-token}
      - GAME_PROJECT_PATH=${GAME_PROJECT_PATH:-/app/demo/study-in-germany}
    volumes:
      # Reports are persisted back onto the host for inspection.
      - ./reports:/app/reports
    profiles:
      - cli
    # No long-running process — the CLI exits when it finishes.
    command: ["python", "tools/run_gameplay_agent.py", "--help"]

# A bare ``docker compose up`` starts only the CPU dashboard. Use profile
# ``judge`` for offline Replay, ``game-tools`` for Godot, ``cli`` for the legacy
# agent, and ``local-nvidia`` only on a compatible NVIDIA host.
