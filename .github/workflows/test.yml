name: Test

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "17 1 * * *"
  workflow_dispatch:
    inputs:
      game_repository:
        description: Private game repository used by the contract smoke test
        required: true
        default: somAzzz/study-in-germany
        type: string
      game_ref:
        description: Exact study-in-germany commit or ref to test
        required: true
        default: 348b9fd5501e71ebc7142e10f9068fc1490b5124
        type: string
      godot_version:
        description: Official godot-builds release tag
        required: true
        default: 4.4-stable
        type: string
      publish_judge_image:
        description: Publish the GHCR multi-architecture Judge image and run native arm64 acceptance
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  python:
    name: Python tests and Ruff
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install locked dependencies
        run: uv sync --extra dev --locked

      - name: Run Python tests
        env:
          # CI runners don't load .env. Pin GAME_PROJECT_PATH to a
          # per-job temp dir so Settings() never falls back to the
          # host-specific default that the developers use locally.
          GAME_PROJECT_PATH: ${{ runner.temp }}/game_analysis_agent/project
        run: uv run pytest -q -ra

      - name: Validate the complete matrix plan
        env:
          GAME_PROJECT_PATH: ${{ runner.temp }}/game_analysis_agent/project
        run: >-
          uv run python tools/run_gameplay_agent.py matrix
          --dry-run --jobs 4 --out /tmp/game-analysis-matrix-plan

      - name: Run Ruff
        run: uv run ruff check .

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Run frontend tests with coverage floors
        run: npm run test:coverage
        working-directory: frontend

      - name: Build frontend
        run: npm run build:public
        working-directory: frontend

  judge-linux-amd64:
    name: Linux amd64 Judge delivery
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Require native Linux amd64 runner
        run: test "$(uname -s)-$(uname -m)" = "Linux-x86_64"

      - name: Idempotent locked evaluator setup
        run: |
          scripts/setup-evaluator
          EVALUATOR_OFFLINE=1 scripts/setup-evaluator

      - name: Record native offline delivery
        run: |
          mkdir -p reports/platform-ci
          python3 tools/judge_doctor.py --mode inspect --json > reports/platform-ci/doctor-inspect.json
          uv run python tools/judge_doctor.py --mode replay --json > reports/platform-ci/doctor-replay.json
          uv run python tools/judge_doctor.py --mode dashboard-native --json > reports/platform-ci/doctor-dashboard-native.json
          ./judge --mode inspect --offline --json --output-dir - > reports/platform-ci/judge-inspect.json
          ./judge --mode replay --offline --json --output-dir - > reports/platform-ci/judge-replay.json

      - name: Build and run the CPU Judge container
        run: |
          docker build --tag playtest-forge-judge:ci --file Dockerfile.judge .
          docker image inspect playtest-forge-judge:ci --format '{{json .}}' > reports/platform-ci/docker-image.json
          docker run --rm --network none --read-only --tmpfs /tmp:size=32m \
            --cap-drop ALL --security-opt no-new-privileges \
            playtest-forge-judge:ci \
            --mode inspect --offline --json --output-dir - > reports/platform-ci/container-inspect.json
          docker run --rm --network none --read-only --tmpfs /tmp:size=32m \
            --cap-drop ALL --security-opt no-new-privileges \
            playtest-forge-judge:ci \
            --mode replay --offline --json --output-dir - > reports/platform-ci/container-replay.json

      - name: Smoke the containerized Judge UI and API
        run: |
          docker run --detach --name playtest-forge-dashboard \
            --publish 127.0.0.1:18080:8080 --read-only --tmpfs /tmp:size=16m \
            --cap-drop ALL --security-opt no-new-privileges \
            --entrypoint /app/.venv/bin/python playtest-forge-judge:ci \
            tools/run_judge_api.py --host 0.0.0.0 --port 8080 --frontend /app/frontend/dist
          for attempt in $(seq 1 20); do
            if curl --fail --silent http://127.0.0.1:18080/api/provider-status \
              > reports/platform-ci/provider-status.json; then
              break
            fi
            sleep 1
          done
          jq -e '.providers.replay.status == "available"' reports/platform-ci/provider-status.json
          curl --fail --silent http://127.0.0.1:18080/ | grep -q '<div id="root"></div>'

      - name: Validate Linux amd64 evidence packet
        run: >-
          uv run python tools/record_platform_evidence.py
          --mode linux-amd64
          --artifact-dir reports/platform-ci
          --output reports/platform-ci/evidence.json

      - name: Stop Judge UI
        if: always()
        run: docker rm --force playtest-forge-dashboard 2>/dev/null || true

      - name: Upload Linux Judge evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: judge-linux-amd64-${{ github.run_id }}
          path: reports/platform-ci
          if-no-files-found: error
          retention-days: 14

  publish-judge-image:
    name: Publish multi-architecture Judge image
    if: github.event_name == 'workflow_dispatch' && inputs.publish_judge_image
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    outputs:
      digest_ref: ${{ steps.metadata.outputs.digest_ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU for image publication only
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build public Judge frontend
        run: npm ci && npm run build:public
        working-directory: frontend

      - name: Authenticate to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push both image manifests
        env:
          JUDGE_IMAGE_TAG: build-week-2026-${{ github.sha }}
        run: |
          owner="$(printf '%s' "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')"
          export JUDGE_IMAGE_REF="ghcr.io/$owner/playtest-forge-judge"
          tools/build_judge_image.sh

      - name: Export digest reference
        id: metadata
        run: |
          reference="$(jq -r .reference judge-image-metadata.json)"
          digest="$(jq -r .index_digest judge-image-metadata.json)"
          echo "digest_ref=${reference}@${digest}" >> "$GITHUB_OUTPUT"

      - name: Upload published image metadata
        uses: actions/upload-artifact@v4
        with:
          name: judge-image-metadata-${{ github.run_id }}
          path: judge-image-metadata.json
          if-no-files-found: error
          retention-days: 14

  judge-linux-arm64:
    name: Native Linux arm64 Judge delivery
    if: github.event_name == 'workflow_dispatch' && inputs.publish_judge_image
    needs: publish-judge-image
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 20
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Require native Linux arm64 runner
        run: |
          test "$(uname -s)" = Linux
          case "$(uname -m)" in aarch64|arm64) ;; *) exit 1 ;; esac

      - name: Execute published image by index digest
        env:
          JUDGE_IMAGE_DIGEST_REF: ${{ needs.publish-judge-image.outputs.digest_ref }}
          P4_LINUX_ARM64_OUTPUT: ${{ github.workspace }}/reports/platform-ci-arm64
        run: scripts/run-p4-linux-arm64-image

      - name: Upload native arm64 evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: judge-linux-arm64-${{ github.run_id }}
          path: reports/platform-ci-arm64
          if-no-files-found: error
          retention-days: 14

  godot-contract:
    name: Real Godot validation and contract smoke
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GAME_REPOSITORY: ${{ inputs.game_repository || 'somAzzz/study-in-germany' }}
      GAME_REF: ${{ inputs.game_ref || '348b9fd5501e71ebc7142e10f9068fc1490b5124' }}
      GODOT_VERSION: ${{ inputs.godot_version || '4.4-stable' }}
      GAME_REPO_TOKEN: ${{ secrets.STUDY_IN_GERMANY_TOKEN }}
      GAME_PROJECT_PATH: ${{ github.workspace }}/study-in-germany
      GODOT_BIN: godot4
    steps:
      - name: Require private repository token
        run: |
          if [[ -z "$GAME_REPO_TOKEN" ]]; then
            echo "STUDY_IN_GERMANY_TOKEN is required to checkout the private game repository."
            exit 1
          fi

      - name: Checkout analysis agent
        uses: actions/checkout@v4
        with:
          path: game-analysis-agent

      - name: Checkout pinned game repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GAME_REPOSITORY }}
          ref: ${{ env.GAME_REF }}
          token: ${{ secrets.STUDY_IN_GERMANY_TOKEN }}
          path: study-in-germany

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: game-analysis-agent/uv.lock

      - name: Install locked dependencies
        run: uv sync --extra dev --locked
        working-directory: game-analysis-agent

      - name: Install verified official Godot build
        run: |
          archive="Godot_v${GODOT_VERSION}_linux.x86_64.zip"
          release="https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}"
          expected_sha512="$(python3 -c 'import json; print(json.load(open("game-analysis-agent/config/build_week_2026_toolchain.json"))["godot"]["assets"]["linux-amd64"]["sha512"])')"
          mkdir -p "$RUNNER_TEMP/godot"
          curl --fail --location --retry 3 "$release/$archive" \
            --output "$RUNNER_TEMP/godot/$archive"
          cd "$RUNNER_TEMP/godot"
          printf '%s  %s\n' "$expected_sha512" "$archive" | sha512sum --check --strict
          unzip -q "$archive"
          install -m 0755 "Godot_v${GODOT_VERSION}_linux.x86_64" "$RUNNER_TEMP/godot4"
          echo "$RUNNER_TEMP" >> "$GITHUB_PATH"

      - name: Show tested revisions
        run: |
          godot4 --version
          git -C study-in-germany rev-parse HEAD
          git -C game-analysis-agent rev-parse HEAD

      - name: Install the versioned interactive integration probe
        run: >-
          install -m 0644
          game-analysis-agent/scripts/tools/RunInteractiveProbe.gd
          study-in-germany/scripts/tools/RunInteractiveProbe.gd

      - name: Generate and analyze a fresh deterministic trace
        working-directory: game-analysis-agent
        run: |
          uv run python tools/run_gameplay_agent.py sim \
            --run-id ci-smoke --runs 12 --policy balanced \
            --difficulty normal --seed 4242 \
            --scenario default_first_semester --weeks 20

      - name: Export catalogs and run every Godot validator with fresh inputs
        working-directory: game-analysis-agent
        run: |
          uv run python tools/run_gameplay_agent.py export \
            --report-dir reports/balance/ci-smoke
          uv run python tools/run_gameplay_agent.py validate \
            --report-dir reports/balance/ci-smoke

      - name: Enforce deterministic smoke gates
        if: always()
        working-directory: game-analysis-agent
        run: |
          uv run python tools/run_gameplay_agent.py gates \
            --report-dir reports/balance/ci-smoke \
            --gates config/ci_gates.yaml

      - name: Capture canonical interactive risk guidance
        if: always()
        working-directory: game-analysis-agent
        run: |
          uv run python tools/run_gameplay_agent.py interactive-probe \
            --run-id ci-interactive-smoke \
            --seed 4242 --difficulty normal \
            --scenario default_first_semester \
            --report-dir reports/interactive/ci-smoke

      - name: Validate real cross-repository contracts
        if: always()
        env:
          GAME_PROJECT_PATH: ${{ github.workspace }}/study-in-germany
          GAME_CONTRACT_TRACE: ${{ github.workspace }}/game-analysis-agent/reports/balance/ci-smoke/raw_runs.jsonl
          GAME_CONTRACT_EVENT_GRAPH: ${{ github.workspace }}/game-analysis-agent/reports/balance/ci-smoke/event_graph.json
          GAME_CONTRACT_ACTION_CATALOG: ${{ github.workspace }}/game-analysis-agent/reports/balance/ci-smoke/action_catalog.json
          GAME_CONTRACT_VALIDATOR: ${{ github.workspace }}/game-analysis-agent/reports/balance/ci-smoke/content_validation.json
          GAME_CONTRACT_INTERACTIVE_PROBE: ${{ github.workspace }}/game-analysis-agent/reports/interactive/ci-smoke/interactive_probe.json
        run: uv run pytest tests/test_game_contract.py -m game_contract -q -ra
        working-directory: game-analysis-agent

      - name: Validate pinned Linux Godot evidence packet
        if: always()
        run: |
          mkdir -p reports/platform-ci
          uv run python tools/record_platform_evidence.py \
            --mode linux-godot --artifact-dir reports \
            --output reports/platform-ci/linux-godot-evidence.json
        working-directory: game-analysis-agent

      - name: Upload generated contract evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: game-contract-${{ github.run_id }}
          path: |
            game-analysis-agent/reports/balance/ci-smoke
            game-analysis-agent/reports/interactive/ci-smoke
            game-analysis-agent/reports/platform-ci
            study-in-germany/reports
          if-no-files-found: warn
          retention-days: 14
